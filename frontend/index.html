    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://chronovue.co/#organization",
          "name": "ChronoVue",
          "url": "https://chronovue.co",
          "logo": "https://chronovue.co/assets/logo.svg",
          "description": "ChronoVue is a SaaS product studio based in Brunei Darussalam. We identify sectors where teams still rely on manual, fragmented processes for critical work, then build the platform that replaces them.",
          "foundingLocation": {
            "@type": "Place",
            "name": "Brunei Darussalam"
          },
          "knowsAbout": [
            "SaaS Product Development",
            "Operational Workflow Automation",
            "Hospital Bed Management Software",
            "Patient Flow Management",
            "Electronic Health Record Integration"
          ]
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://chronovue.co/flow#product",
          "name": "FLOW",
          "applicationCategory": "HealthcareApplication",
          "operatingSystem": "Web Browser",
          "description": "FLOW is a real-time hospital operational visibility platform that replaces paper census sheets, Excel files, whiteboards, and WhatsApp with a single live dashboard. It shows bed occupancy across all wards and tracks patient movement for nurse managers and Clinical Site Coordinators (CSCs). Deployed on-premise on the hospital LAN. Piloting at the Acute Medical Unit (AMU) in Brunei.",
          "creator": {
            "@id": "https://chronovue.co/#organization"
          },
          "featureList": [
            "Real-time bed occupancy heatmap across all wards",
            "Patient transfer tracking and instant transfer-ready flags",
            "Automated census sheet updates on transfer confirmation",
            "Admission queue management for nurse managers",
            "Hospital-wide visibility for Clinical Site Coordinators",
            "EHR integration layer for automated patient status sync",
            "Role-based access control (RBAC) per ward",
            "On-premise deployment with all data staying within the hospital LAN"
          ],
          "offers": {
            "@type": "Offer",
            "description": "Paid pilot program for hospitals in Brunei Darussalam. SaaS licensing available per hospital."
          }
        }
      ]
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
