services:
  postgres:
    image: postgres:16-alpine
    container_name: chronovue_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chronovue}
      POSTGRES_USER: ${POSTGRES_USER:-chronovue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronovue_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronovue}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: chronovue_backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-chronovue}:${POSTGRES_PASSWORD:-chronovue_secret}@postgres:5432/${POSTGRES_DB:-chronovue}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chronovue_frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: chronovue_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
